<!DOCTYPE html>
<html lang="en">
    <head>
        <title>Grade 10 Classmates System</title>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <link rel="stylesheet" href="https://pyscript.net/releases/2025.11.1/core.css">
        <script type="module" src="https://pyscript.net/releases/2025.11.1/core.js"></script>
        <link rel="stylesheet" href="style.css">
        <style>
            body {
                background-color: #f0f0f0;
  
            }
            
            .container {
                background-color: white;
                padding: 40px;
                border-radius: 8px;
                box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
                max-width: 600px;
                margin: 0 auto;
            }
        </style>
    </head>
    <body style="background-color: #e27696;">
        <div class="container-navbar">
            <navbar class="navbar-one">
                <a href="https://ademata-10e.github.io/GH_ICT10_Q4Project/">Home</a>
                <a href="https://hikarihikaru0317.github.io/GH_ICT10_Q4SkillsTest_Hikari_Fukuda/">Attendance Tracker</a>
                <a href="https://hikarihikaru0317.github.io/GH_ICT10_Q4Seatwork2_Fukuda_Hikari/">Class List</a>
            </navbar>
        </div>
        <div class="container" style="background-color: #e27696;">
            <h2>Grade 10 Classmates System</h2>
            <p>Add and view your classmates easily</p>
            <div>
                <input type="text" id="nameInput" placeholder="Name">
                <input type="text" id="sectionInput" placeholder="Section">
                <input type="text" id="subjectInput" placeholder="Favorite Subject">
                <br>
                <button py-click="add_classmate" style="background-color: #00800bfc; color: white; border: none; border-radius: 4px;">Add Classmate</button>
                <button py-click="show_list" style="background-color: #1a91d1; color: white; border: none; border-radius: 4px;">Show List</button>
            </div>

            <div id="listArea">
                <h3>📋 Classmate List</h3>
                <p id="message"></p>
            </div>
        </div>
        <div style="background-color: #aa1275; color: white; position: absolute; bottom: 0; width: 100%;"><p align="center" >Aurelia De Mata | Hikari Fukuda - 10 Emerald | 2025-2026</p></div>
        <py-script src="main.py"></py-script>
    </body>
</html>
